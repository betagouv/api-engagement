version: "3.9"

services:
  postgres-analytics:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: api-engagement-analytics
    ports:
      - "5431:5432"
    volumes:
      - postgres-analytics-data:/var/lib/postgresql/data

  postgres-core:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: api-engagement-core
    ports:
      - "5433:5432"
    volumes:
      - postgres-core-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    depends_on:
      - postgres-core
    environment:
      PORT: 3002
      DATABASE_URL_CORE: postgres://user:password@postgres-core:5432/api-engagement-core
      WORKER_URL: http://worker:3004
      TYPESENSE_HOST: typesense
    volumes:
      - ./api:/workspace/api
      - /workspace/api/node_modules
      - ./packages/taxonomy:/workspace/packages/taxonomy
    ports:
      - "3002:3002"

  worker:
    build:
      context: .
      dockerfile: api/Dockerfile.worker
    depends_on:
      - postgres-core
    environment:
      PORT_WORKER: 3004
      ENV: development
      DATABASE_URL_CORE: postgres://user:password@postgres-core:5432/api-engagement-core
      WORKER_URL: http://worker:3004
      TYPESENSE_HOST: typesense
    volumes:
      - ./api:/workspace/api
      - /workspace/api/node_modules
      - ./packages/taxonomy:/workspace/packages/taxonomy
    ports:
      - "3004:3004"

  plateform:
    build:
      context: .
      dockerfile: plateform/Dockerfile
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:3002
      VITE_ENV: development
    volumes:
      - ./plateform:/workspace/plateform
      - /workspace/plateform/node_modules
      - ./packages/taxonomy:/workspace/packages/taxonomy
    ports:
      - "3005:3005"

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    depends_on:
      - api
    environment:
      PORT: 3000
      VITE_API_URL: http://localhost:3002
    volumes:
      - ./app:/workspace/app
      - /workspace/app/node_modules
    ports:
      - "3000:3000"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

  widget:
    build:
      context: .
      dockerfile: widget/Dockerfile
    depends_on:
      - api
    environment:
      API_URL: http://localhost:3002
      ENV: development
    volumes:
      - ./widget:/workspace/widget
      - /workspace/widget/node_modules
    ports:
      - "3003:3003"

  typesense:
    image: typesense/typesense:30.2
    restart: always
    command: --data-dir /data --api-key=xyz --enable-cors
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data

  typesense-setup:
    build:
      context: .
      dockerfile: api/Dockerfile
    depends_on:
      typesense:
        condition: service_started
      postgres-core:
        condition: service_started
    environment:
      DATABASE_URL_CORE: postgres://user:password@postgres-core:5432/api-engagement-core
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: 8108
      TYPESENSE_API_KEY: xyz
      TYPESENSE_MISSION_COLLECTION: missions
    volumes:
      - ./api:/workspace/api
      - /workspace/api/node_modules
      - ./packages/taxonomy:/workspace/packages/taxonomy
    command: ["sh", "-c", "sleep 20 && npx ts-node src/jobs/run-job.ts setup-search-collections"]
    restart: "no"

volumes:
  postgres-analytics-data:
  postgres-core-data:
  typesense-data:

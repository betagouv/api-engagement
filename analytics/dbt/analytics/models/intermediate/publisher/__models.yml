version: 2

models:
  - name: int_publisher_diffusion_rule
    description: >
      Modèle intermédiaire (table complète) des règles de diffusion par partenaire, dérivé de
      `stg_publisher_diffusion_rule`. Reconstruit intégralement à chaque run dbt.
    columns:
      - name: id
        description: Identifiant unique de la règle.
        tests:
          - not_null
          - unique
      - name: publisher_id
        description: Identifiant du partenaire diffuseur.
        tests:
          - not_null
      - name: field
        description: Champ ciblé par la règle.
        tests:
          - not_null
      - name: field_type
        description: Typage fonctionnel du champ (nullable).
      - name: operator
        description: Opérateur de comparaison.
        tests:
          - not_null
      - name: value
        description: Valeur comparée.
        tests:
          - not_null
      - name: combinator
        description: Combinaison logique avec les autres règles.
        tests:
          - not_null
      - name: position
        description: Ordre d'application de la règle.
        tests:
          - not_null
      - name: combined_with_id
        description: Identifiant de la règle parente (auto-référence, nullable).
      - name: created_at
        description: Timestamp de création.
        tests:
          - not_null
      - name: updated_at
        description: Timestamp de dernière mise à jour.
        tests:
          - not_null
  - name: int_publisher_organization
    description: >
      Modèle intermédiaire incrémental des organisations rattachées aux partenaires, dérivé de
      `stg_publisher_organization` et aligné sur le schéma métier actuel.
    columns:
      - name: id
        description: Identifiant unique de la relation partenaire / organisation.
        tests:
          - not_null
          - unique
      - name: publisher_id
        description: Identifiant du partenaire diffuseur associé.
        tests:
          - not_null
      - name: client_id
        description: Identifiant client de l'organisation côté diffuseur.
        tests:
          - not_null
      - name: name
        description: Nom déclaré de l'organisation (nullable).
      - name: url
        description: URL publique de l'organisation (nullable).
      - name: type
        description: Type d'organisation (nullable).
      - name: logo
        description: URL du logo de l'organisation (nullable).
      - name: description
        description: Description textuelle de l'organisation (nullable).
      - name: full_address
        description: Adresse complète déclarée pour l'organisation (nullable).
      - name: rna
        description: Identifiant RNA déclaré (nullable).
      - name: siren
        description: Numéro SIREN déclaré (nullable).
      - name: siret
        description: Numéro SIRET déclaré (nullable).
      - name: postal_code
        description: Code postal de l'organisation (nullable).
      - name: city
        description: Ville de l'organisation (nullable).
      - name: legal_status
        description: Statut juridique déclaré (nullable).
      - name: beneficiaries
        description: Liste des publics bénéficiaires associés à l'organisation.
      - name: actions
        description: Liste des actions associées à l'organisation.
      - name: parent_organizations
        description: Liste des réseaux ou organisations parentes déclarées.
      - name: verification_status
        description: Statut de vérification global de l'organisation (nullable).
      - name: organization_id
        description: Identifiant de l'organisation core validée lors de la vérification (nullable).
      - name: created_at
        description: Horodatage de création de l'enregistrement source.
        tests:
          - not_null
      - name: updated_at
        description: Horodatage de dernière mise à jour, utilisé par l'incrémental.
        tests:
          - not_null

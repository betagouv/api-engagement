version: 2

models:
  - name: user
    description: >
      Dimension des comptes utilisateurs exposée à Metabase. Ce modèle reprend la table `stg_user` et est incrémenté sur
      le champ `updated_at` pour faciliter les analyses des habilitations et de l'activité.
    columns:
      - name: id
        description: Identifiant unique du compte utilisateur.
        tests:
          - not_null
          - unique
      - name: first_name
        description: Prénom déclaré par l'utilisateur.
      - name: last_name
        description: Nom de famille déclaré (nullable).
      - name: email
        description: Adresse email de connexion.
      - name: role
        description: Rôle applicatif (`ADMIN`, `PUBLISHER`, `OPERATOR`, ...).
      - name: deleted_at
        description: Timestamp de suppression logique (nullable).
      - name: last_activity_at
        description: Dernière activité observée dans l'application (nullable).
      - name: created_at
        description: Timestamp de création du compte.
      - name: updated_at
        description: Timestamp de dernière mise à jour, utilisé comme curseur d'incrément.
        tests:
          - not_null
  - name: user_publisher
    description: >
      Table de faits légère liant les utilisateurs aux partenaires dont ils gèrent les missions. Permet de suivre les
      rattachements et leur fraîcheur dans l'entrepôt analytics.
    columns:
      - name: id
        description: Identifiant unique du rattachement.
        tests:
          - not_null
          - unique
      - name: user_id
        description: Identifiant de l'utilisateur rattaché.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('user')
                field: id
      - name: publisher_id
        description: Identifiant du partenaire associé à l'utilisateur.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('publisher')
                field: id
      - name: created_at
        description: Timestamp de création du rattachement.
      - name: updated_at
        description: Timestamp de dernière mise à jour du rattachement (curseur d'incrément).
        tests:
          - not_null
  - name: login_history
    description: >
      Historique des connexions utilisateurs produit à partir de la table `stg_login_history`, elle-même alimentée par
      `core.login_history`. Chaque ligne correspond à une connexion unique pour un utilisateur donné.
    columns:
      - name: user_id
        description: Identifiant de l'utilisateur connecté.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('user')
                field: id
      - name: login_at
        description: Timestamp de la connexion rapportée par l'application.
        tests:
          - not_null
  - name: user_scoring
    description: >
      Vue d'exposition des scorings utilisateur, dérivée de `stg_user_scoring`. Chaque ligne représente une demande de
      scoring utilisateur avec son état d'alerte mission et ses dates de validité.
    columns:
      - name: id
        description: Identifiant unique du scoring utilisateur.
        tests:
          - not_null
          - unique
      - name: distinct_id
        description: Identifiant anonyme ou technique permettant de rattacher plusieurs interactions utilisateur.
      - name: mission_alert_enabled
        description: Indique si l'utilisateur a activé l'alerte mission associée à ce scoring.
        tests:
          - not_null
      - name: created_at
        description: Timestamp de création du scoring utilisateur.
        tests:
          - not_null
      - name: expires_at
        description: Timestamp d'expiration du scoring, si une limite de validité est définie.
      - name: updated_at
        description: Timestamp de dernière mise à jour du scoring utilisateur.
        tests:
          - not_null
  - name: user_scoring_value
    description: >
      Vue d'exposition des scores utilisateur par valeur de taxonomie, dérivée de `stg_user_scoring_value`.
    columns:
      - name: id
        description: Identifiant unique de la valeur de scoring utilisateur.
        tests:
          - not_null
          - unique
      - name: user_scoring_id
        description: Identifiant du scoring utilisateur parent.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('user_scoring')
                field: id
      - name: taxonomy_key
        description: Clé de la taxonomie utilisée pour qualifier le scoring.
      - name: value_key
        description: Clé de la valeur de taxonomie scorée.
      - name: score
        description: Score utilisateur calculé pour cette valeur de taxonomie.
        tests:
          - not_null
      - name: created_at
        description: Timestamp de création de la valeur de scoring.
        tests:
          - not_null
      - name: updated_at
        description: Timestamp de dernière mise à jour de la valeur de scoring.
        tests:
          - not_null

server {
    listen 8080;

    large_client_header_buffers 4 32k;
    client_header_buffer_size 16k;

    # Proxy API endpoints to avoid CORS (API_URL injected at container startup)
    location /user-scoring {
        proxy_pass API_URL_PLACEHOLDER/user-scoring;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /poc {
        proxy_pass API_URL_PLACEHOLDER/poc;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Serve Vite SPA
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

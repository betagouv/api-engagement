# Repackage manuelle de l'extension Chrome et mise à jour de l'asset sur la dernière release.
# Le packaging automatique est intégré à release.yml (déclenché uniquement si les fichiers
# de l'extension ont changé depuis le tag précédent). Ce workflow sert au repackaging ad hoc.

name: Chrome Extension Package

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to upload release assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Get latest release tag
        id: latest_release
        run: |
          TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          if [ -z "$TAG" ]; then
            echo "No release found, skipping."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Package extension
        run: |
          cd tools
          zip -r chrome-extension-api-engagement.zip chrome-extension/ \
            --exclude "chrome-extension/README.md"
          echo "Archive size: $(du -sh chrome-extension-api-engagement.zip | cut -f1)"

      - name: Upload asset to latest release
        run: |
          gh release upload ${{ steps.latest_release.outputs.tag }} \
            tools/chrome-extension-api-engagement.zip \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}

name: Lint

on:
  pull_request:
  push:
    branches: [main, staging]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Run ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          npm ci

      - name: Run ESLint
        run: npm run lint

  lint-openapi:
    name: Lint OpenAPI spec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Lint OpenAPI spec
        run: npx --yes @redocly/cli lint --config api/redocly.yaml

  lint-analytics-models:
    name: Run SQLFluff on Analytics models
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install SQLFluff
        run: pip install --no-cache-dir -r analytics/dbt/analytics/requirements.txt

      - name: Lint dbt project
        run: sqlfluff lint --config analytics/dbt/analytics/.sqlfluff analytics/dbt/analytics/models

name: Changelog Notify

on:
  # Appelé par main-pipeline.yml après un déploiement réussi
  workflow_call:
    inputs:
      tag:
        description: "Tag de release à traiter (ex: v1.2.3). Si vide, le dernier tag v* est utilisé."
        type: string
        required: false
        default: ""

  # Exécution manuelle depuis l'UI GitHub (re-génération d'un changelog)
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag de release à traiter (ex: v1.2.3). Si vide, le dernier tag v* est utilisé."
        type: string
        required: false
        default: ""

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Nécessaire pour parcourir tout l'historique git

      - name: Resolve tag
        id: resolve-tag
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(git describe --tags --abbrev=0 --match 'v*')
            echo "Aucun tag fourni, utilisation du dernier tag : $TAG"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: scripts

      - name: Generate & publish changelog
        working-directory: scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_CHANGELOG_DATABASE_ID: ${{ secrets.NOTION_CHANGELOG_DATABASE_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_RELEASE_CHANNEL_ID: ${{ secrets.SLACK_RELEASE_CHANNEL_ID }}
        run: npx ts-node generate-changelog.ts --tag ${{ steps.resolve-tag.outputs.tag }}
